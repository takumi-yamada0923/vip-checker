<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>スマブラVIP管理</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body {
  font-family: sans-serif;
}

table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

th input {
  width: 90%;
}

button {
  width: 70px;
  height: 35px;
  cursor: pointer;
}

.vip {
  background-color: #4caf50;
  color: white;
}

.nonvip {
  background-color: #ccc;
}

.char-vip {
  background-color: #4caf50;
  color: white;
}

.icon {
  width: 40px;
  height: 40px;
}
</style>
</head>

<body>

<h2>スマブラVIP管理</h2>

<table id="table">
  <thead>
    <tr>
      <th>画像</th>
      <th>キャラ</th>
      <th><input id="col1"></th>
      <th><input id="col2"></th>
      <th><input id="col3"></th>
      <th><input id="col4"></th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB-qPzDHJSnRHNHKvNdD-sTu6v1-sRnilI",
  authDomain: "zatsudan-mate.firebaseapp.com",
  databaseURL: "https://zatsudan-mate-default-rtdb.firebaseio.com",
  projectId: "zatsudan-mate",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== キャラ + アイコン =====
const characters = [
  {name:"マリオ", img:"https://www.smashbros.com/assets_v2/img/fighter/mario/main.png"},
  {name:"リンク", img:"https://www.smashbros.com/assets_v2/img/fighter/link/main.png"},
  {name:"カービィ", img:"https://www.smashbros.com/assets_v2/img/fighter/kirby/main.png"},
  {name:"ピカチュウ", img:"https://www.smashbros.com/assets_v2/img/fighter/pikachu/main.png"}
];

const tbody = document.querySelector("#table tbody");

// ===== 描画 =====
characters.forEach((ch, i) => {
  const tr = document.createElement("tr");

  // 画像
  const tdImg = document.createElement("td");
  const img = document.createElement("img");
  img.src = ch.img;
  img.className = "icon";
  tdImg.appendChild(img);
  tr.appendChild(tdImg);

  // キャラ名
  const tdName = document.createElement("td");
  tdName.textContent = ch.name;
  tdName.classList.add("char-name");
  tr.appendChild(tdName);

  // ボタン
  for (let col = 1; col <= 4; col++) {
    const td = document.createElement("td");
    const btn = document.createElement("button");

    btn.textContent = "非VIP";
    btn.className = "nonvip";

    btn.onclick = () => toggle(i, col, btn);

    td.appendChild(btn);
    tr.appendChild(td);
  }

  tbody.appendChild(tr);
});

// ===== VIP切替 =====
function toggle(row, col, btn) {
  const isVIP = btn.textContent === "VIP";

  const newVal = isVIP ? "非VIP" : "VIP";
  btn.textContent = newVal;
  btn.className = isVIP ? "nonvip" : "vip";

  db.ref(`vip/${row}/${col}`).set(newVal);

  updateRowColor(row);
}

// ===== 行の色更新 =====
function updateRowColor(row) {
  const tr = document.querySelectorAll("tbody tr")[row];
  const buttons = tr.querySelectorAll("button");

  const hasVIP = Array.from(buttons).some(b => b.textContent === "VIP");

  const nameCell = tr.querySelector(".char-name");

  if (hasVIP) {
    nameCell.classList.add("char-vip");
  } else {
    nameCell.classList.remove("char-vip");
  }
}

// ===== ヘッダー保存 =====
["col1","col2","col3","col4"].forEach(id => {
  document.getElementById(id).addEventListener("change", () => {
    db.ref("headers").set({
      col1: col1.value,
      col2: col2.value,
      col3: col3.value,
      col4: col4.value
    });
  });
});

// ===== Firebase反映 =====
db.ref().on("value", snap => {
  const data = snap.val();
  if (!data) return;

  if (data.headers) {
    col1.value = data.headers.col1 || "";
    col2.value = data.headers.col2 || "";
    col3.value = data.headers.col3 || "";
    col4.value = data.headers.col4 || "";
  }

  if (data.vip) {
    document.querySelectorAll("tbody tr").forEach((tr, row) => {
      for (let col = 1; col <= 4; col++) {
        const btn = tr.children[col+1].querySelector("button");
        const val = data.vip?.[row]?.[col];

        if (val === "VIP") {
          btn.textContent = "VIP";
          btn.className = "vip";
        } else {
          btn.textContent = "非VIP";
          btn.className = "nonvip";
        }
      }
      updateRowColor(row);
    });
  }
});
</script>

</body>
</html>
