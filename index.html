<style>
body {
  font-family: sans-serif;
}

/* ===== テーブル ===== */
table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  text-align: center;
}

/* ヘッダーを大きく */
th {
  height: 80px;         /* ← 好みで調整（今の約2倍） */
  font-size: 1.2em;
}

/* 入力欄も大きく */
th input {
  height: 40px;
  font-size: 1.1em;
}
  
/* ===== キャラ列（大きく） ===== */
.char-cell {
  font-size: 1.5em;
  padding: 12px;
}

.icon {
  width: 80px;   /* 2倍 */
  height: 80px;
}

/* ===== ボタン列（小さく） ===== */
button {
  width: 60px;
  height: 30px;
  font-size: 0.9em;
  cursor: pointer;
}

.vip {
  background-color: #4caf50;
  color: white;
}

.nonvip {
  background-color: #ccc;
}

.char-vip {
  background-color: #4caf50;
  color: white;
}

th input {
  width: 90%;
}
</style>
</head>

/* ===== 描画 ===== */
const tbody = document.querySelector("#table tbody");

  const tr = document.createElement("tr");

  // 画像
  const tdImg = document.createElement("td");

  }else if (id == "mii_fighter_2"){
    img.src = 'https://smashwiki.info/Mii_%E5%89%A3%E8%A1%93%E3%82%BF%E3%82%A4%E3%83%97_%28SP%29#/media/%E3%83%95%E3%82%A1%E3%82%A4%E3%83%AB:%E5%85%AC%E5%BC%8F%E7%B5%B5_SP_Mii_%E5%89%A3%E8%A1%93%E3%82%BF%E3%82%A4%E3%83%97.png';
  }else if (id == "mii_fighter_3"){
    img.src = 'https://smashwiki.info/Mii_%E5%B0%84%E6%92%83%E3%82%BF%E3%82%A4%E3%83%97_(SP)#/media/%E3%83%95%E3%82%A1%E3%82%A4%E3%83%AB:%E5%85%AC%E5%BC%8F%E7%B5%B5_SP_Mii_%E5%B0%84%E6%92%83%E3%82%BF%E3%82%A4%E3%83%97.png';
  }else {
    img.src = `https://www.smashbros.com/assets_v2/img/fighter/${id}/main.png`;
  }
  img.className = "icon";
  tdImg.appendChild(img);
  tr.appendChild(tdImg);

  // 名前
  const tdName = document.createElement("td");
  tdName.textContent = nameMap[id] || id;
  tdName.className = "char-cell char-name";
  tr.appendChild(tdName);

  // ボタン
  for (let col = 1; col <= 4; col++) {
    const td = document.createElement("td");
    const btn = document.createElement("button");

    btn.textContent = "非VIP";
    btn.className = "nonvip";

    btn.onclick = () => toggle(i, col, btn);

    td.appendChild(btn);
    tr.appendChild(td);
  }

  tbody.appendChild(tr);
});

/* ===== 切替 ===== */
function toggle(row, col, btn) {
  const isVIP = btn.textContent === "VIP";
  const newVal = isVIP ? "非VIP" : "VIP";

  btn.textContent = newVal;
  btn.className = isVIP ? "nonvip" : "vip";

  db.ref(`vip/${row}/${col}`).set(newVal);

  updateRowColor(row);
}

/* ===== 行色 ===== */
function updateRowColor(row) {
  const tr = document.querySelectorAll("tbody tr")[row];
  const buttons = tr.querySelectorAll("button");
  const hasVIP = Array.from(buttons).some(b => b.textContent === "VIP");

  const nameCell = tr.querySelector(".char-name");

  if (hasVIP) nameCell.classList.add("char-vip");
  else nameCell.classList.remove("char-vip");
}

/* ===== Firebase反映 ===== */
db.ref().on("value", snap => {
  const data = snap.val();
  if (!data) return;

  if (data.vip) {
    document.querySelectorAll("tbody tr").forEach((tr, row) => {
      for (let col = 1; col <= 4; col++) {
        const btn = tr.children[col+1].querySelector("button");
        const val = data.vip?.[row]?.[col];

        if (val === "VIP") {
          btn.textContent = "VIP";
          btn.className = "vip";
        } else {
          btn.textContent = "非VIP";
          btn.className = "nonvip";
        }
      }
      updateRowColor(row);
    });
  }
  // ヘッダー復元
  if (data.headers) {
    document.getElementById("col1").value = data.headers.col1 || "";
    document.getElementById("col2").value = data.headers.col2 || "";
    document.getElementById("col3").value = data.headers.col3 || "";
    document.getElementById("col4").value = data.headers.col4 || "";
  }
});

// ヘッダー保存
["col1","col2","col3","col4"].forEach(id => {
  document.getElementById(id).addEventListener("input", () => {
    db.ref("headers").set({
      col1: document.getElementById("col1").value,
      col2: document.getElementById("col2").value,
      col3: document.getElementById("col3").value,
      col4: document.getElementById("col4").value
    });
  });
});
