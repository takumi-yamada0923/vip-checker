<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>スマブラVIP管理</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body {
  font-family: sans-serif;
}

/* ===== テーブル ===== */
table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  text-align: center;
}

/* ===== キャラ列（大きく） ===== */
.char-cell {
  font-size: 1.5em;
  padding: 12px;
}

.icon {
  width: 80px;   /* 2倍 */
  height: 80px;
}

/* ===== ボタン列（小さく） ===== */
button {
  width: 60px;
  height: 30px;
  font-size: 0.9em;
  cursor: pointer;
}

.vip {
  background-color: #4caf50;
  color: white;
}

.nonvip {
  background-color: #ccc;
}

.char-vip {
  background-color: #4caf50;
  color: white;
}

th input {
  width: 90%;
}
</style>
</head>

<body>

<h2>スマブラVIP管理</h2>

<table id="table">
<thead>
<tr>
  <th>画像</th>
  <th>キャラ</th>
  <th><input id="col1"></th>
  <th><input id="col2"></th>
  <th><input id="col3"></th>
  <th><input id="col4"></th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB-qPzDHJSnRHNHKvNdD-sTu6v1-sRnilI",
  authDomain: "zatsudan-mate.firebaseapp.com",
  databaseURL: "https://zatsudan-mate-default-rtdb.firebaseio.com",
  projectId: "zatsudan-mate",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ===== 全キャラ（略称は公式URL準拠） ===== */
const fighters = [
"mario","donkey","link","samus","dark_samus","yoshi","kirby","fox",
"pikachu","luigi","ness","captain","purin","peach","daisy","koopa",
"ice_climber","sheik","zelda","dr_mario","pichu","falco","marth",
"lucina","younglink","ganon","mewtwo","roy","chrom","mr_gamewatch",
"metaknight","pit","darkpit","zero_suit_samus","wario","snake",
"ike","pokemon_trainer","diddy","lucas","sonic","dedede","olimar",
"lucario","robot","toonlink","wolf","villager","megaman","wiifit",
"rosetta","littlemac","gekkouga","palutena","pacman","reflet",
"shulk","koopajr","duckhunt","ryu","ken","cloud","kamui","bayonetta",
"inkling","ridley","simon","richter","krool","shizue","gaogaen",
"packun","joker","brave","banjo","terry","byleth","minmin","steve",
"sephiroth","pyra","mythra","kazuya","sora"
];

/* 表示名（最低限） */
const nameMap = {
  mario:"マリオ", link:"リンク", kirby:"カービィ", pikachu:"ピカチュウ"
};

/* ===== 描画 ===== */
const tbody = document.querySelector("#table tbody");

fighters.forEach((id, i) => {
  const tr = document.createElement("tr");

  // 画像
  const tdImg = document.createElement("td");
  const img = document.createElement("img");
  img.src = `https://www.smashbros.com/assets_v2/img/fighter/${id}/main.png`;
  img.className = "icon";
  tdImg.appendChild(img);
  tr.appendChild(tdImg);

  // 名前
  const tdName = document.createElement("td");
  tdName.textContent = nameMap[id] || id;
  tdName.className = "char-cell char-name";
  tr.appendChild(tdName);

  // ボタン
  for (let col = 1; col <= 4; col++) {
    const td = document.createElement("td");
    const btn = document.createElement("button");

    btn.textContent = "非VIP";
    btn.className = "nonvip";

    btn.onclick = () => toggle(i, col, btn);

    td.appendChild(btn);
    tr.appendChild(td);
  }

  tbody.appendChild(tr);
});

/* ===== 切替 ===== */
function toggle(row, col, btn) {
  const isVIP = btn.textContent === "VIP";
  const newVal = isVIP ? "非VIP" : "VIP";

  btn.textContent = newVal;
  btn.className = isVIP ? "nonvip" : "vip";

  db.ref(`vip/${row}/${col}`).set(newVal);

  updateRowColor(row);
}

/* ===== 行色 ===== */
function updateRowColor(row) {
  const tr = document.querySelectorAll("tbody tr")[row];
  const buttons = tr.querySelectorAll("button");
  const hasVIP = Array.from(buttons).some(b => b.textContent === "VIP");

  const nameCell = tr.querySelector(".char-name");

  if (hasVIP) nameCell.classList.add("char-vip");
  else nameCell.classList.remove("char-vip");
}

/* ===== Firebase反映 ===== */
db.ref().on("value", snap => {
  const data = snap.val();
  if (!data) return;

  if (data.vip) {
    document.querySelectorAll("tbody tr").forEach((tr, row) => {
      for (let col = 1; col <= 4; col++) {
        const btn = tr.children[col+1].querySelector("button");
        const val = data.vip?.[row]?.[col];

        if (val === "VIP") {
          btn.textContent = "VIP";
          btn.className = "vip";
        } else {
          btn.textContent = "非VIP";
          btn.className = "nonvip";
        }
      }
      updateRowColor(row);
    });
  }
});
</script>

</body>
</html>
