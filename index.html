<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>雑談枠スマブラVIP管理</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body {
  font-family: sans-serif;
  margin: 0;
}

table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  text-align: center;
}

/* ===== ヘッダー固定 ===== */
thead th {
  position: sticky;
  top: 0;
  background: #fff;
  z-index: 10;
}

/* ===== ヘッダー ===== */
th {
  height: 80px;
  font-size: 1.2em;
}

/* ★ 下線だけ色付け（今回の本命） */
th.col1 { border-bottom: 4px solid #4caf50; }
th.col2 { border-bottom: 4px solid #2196f3; }
th.col3 { border-bottom: 4px solid #ff9800; }
th.col4 { border-bottom: 4px solid #e91e63; }

th input {
  height: 40px;
  font-size: 1.1em;
  width: 90%;
  background: #fff;
  color: #000;
  border: 1px solid #ccc;
  text-align: center;
}

/* ===== キャラ ===== */
.char-cell {
  font-size: 1.5em;
  padding: 12px;
}

.icon {
  width: 80px;
  height: 80px;
}

/* ===== 行 ===== */
tbody tr {
  height: 70px;
}

td {
  padding: 0;
  height: 70px;
}

/* ===== ボタン（完全フィット） ===== */
td button {
  display: block;
  width: 100%;
  height: 100%;
  font-size: 2em;
  border: none;
  cursor: pointer;
}

/* ===== VIPカラー ===== */
.vip.col1 { background:#4caf50; color:#fff; }
.vip.col2 { background:#2196f3; color:#fff; }
.vip.col3 { background:#ff9800; color:#fff; }
.vip.col4 { background:#e91e63; color:#fff; }

/* 非VIP */
.nonvip {
  background:#fff;
  color:#000;
}

/* ===== 上部ヘッダー ===== */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
}

.header h2 {
  margin: 0;
}

.header a {
  font-size: 1.1em;
  text-decoration: none;
  color: #2196f3;
  font-weight: bold;
}

.header a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="header">
  <h2>雑談枠スマブラVIP管理</h2>
  <a href="https://takumi-yamada0923.github.io/bingo-viewer/" target="_blank">
    チームビンゴはこちら
  </a>
</div>

<table id="table">
<thead>
<tr>
  <th>画像</th>
  <th>キャラ</th>
  <th class="col1"><input id="col1"></th>
  <th class="col2"><input id="col2"></th>
  <th class="col3"><input id="col3"></th>
  <th class="col4"><input id="col4"></th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB-qPzDHJSnRHNHKvNdD-sTu6v1-sRnilI",
  authDomain: "zatsudan-mate.firebaseapp.com",
  databaseURL: "https://zatsudan-mate-default-rtdb.firebaseio.com",
  projectId: "zatsudan-mate",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 色 */
const colColors = {
  1: "#4caf50",
  2: "#2196f3",
  3: "#ff9800",
  4: "#e91e63"
};

/* キャラ */
const fighters = [
"mario","donkey_kong","link","samus","dark_samus","yoshi","kirby","fox",
"pikachu","luigi","ness","captain_falcon","purin","peach","daisy","koopa",
"ice_climber","sheik","zelda","dr_mario","pichu","falco","marth","lucina",
"young_link","ganondorf","mewtwo","roy","chrom","mr_game_and_watch",
"meta_knight","pit","black_pit","zero_suit_samus","wario","snake","ike",
"pokemon_trainer","diddy_kong","lucas","sonic","dedede","olimar","lucario",
"robot","toon_link","wolf","villager","rockman","wii_fit_trainer",
"rosetta_and_chiko","little_mac","gekkouga","palutena","pac_man","reflet",
"shulk","koopa_jr","duck_hunt","ryu","ken","cloud","kamui","bayonetta",
"inkling","ridley","simon","richter","king_k_rool","shizue","gaogaen",
"packun_flower","joker","dq_hero","banjo_and_kazooie","terry","byleth",
"minmin","steve","sephiroth","pyra","kazuya","sora",
"mii_fighter_1","mii_fighter_2","mii_fighter_3"
];

const nameMap = {
mario:"マリオ",donkey_kong:"ドンキーコング",link:"リンク",samus:"サムス",
dark_samus:"ダークサムス",yoshi:"ヨッシー",kirby:"カービィ",fox:"フォックス",
pikachu:"ピカチュウ",luigi:"ルイージ",ness:"ネス",
captain_falcon:"キャプテン・ファルコン",purin:"プリン",peach:"ピーチ",
daisy:"デイジー",koopa:"クッパ",ice_climber:"アイスクライマー",
sheik:"シーク",zelda:"ゼルダ",dr_mario:"ドクターマリオ",pichu:"ピチュー",
falco:"ファルコ",marth:"マルス",lucina:"ルキナ",young_link:"こどもリンク",
ganondorf:"ガノンドロフ",mewtwo:"ミュウツー",roy:"ロイ",chrom:"クロム",
mr_game_and_watch:"Mr.ゲーム&ウォッチ",meta_knight:"メタナイト",
pit:"ピット",black_pit:"ブラックピット",zero_suit_samus:"ゼロスーツサムス",
wario:"ワリオ",snake:"スネーク",ike:"アイク",
pokemon_trainer:"ポケモントレーナー",diddy_kong:"ディディーコング",
lucas:"リュカ",sonic:"ソニック",dedede:"デデデ",olimar:"ピクミン&オリマー",
lucario:"ルカリオ",robot:"ロボット",toon_link:"トゥーンリンク",
wolf:"ウルフ",villager:"むらびと",rockman:"ロックマン",
wii_fit_trainer:"Wii Fit トレーナー",rosetta_and_chiko:"ロゼッタ&チコ",
little_mac:"リトル・マック",gekkouga:"ゲッコウガ",palutena:"パルテナ",
pac_man:"パックマン",reflet:"ルフレ",shulk:"シュルク",
koopa_jr:"クッパ Jr.",duck_hunt:"ダックハント",ryu:"リュウ",ken:"ケン",
cloud:"クラウド",kamui:"カムイ",bayonetta:"ベヨネッタ",
inkling:"インクリング",ridley:"リドリー",simon:"シモン",
richter:"リヒター",king_k_rool:"キングクルール",shizue:"しずえ",
gaogaen:"ガオガエン",packun_flower:"パックンフラワー",
joker:"ジョーカー",dq_hero:"勇者",banjo_and_kazooie:"バンジョー&カズーイ",
terry:"テリー",byleth:"ベレト / ベレス",minmin:"ミェンミェン",
steve:"スティーブ",sephiroth:"セフィロス",pyra:"ホムラ / ヒカリ",
kazuya:"カズヤ",sora:"ソラ",
mii_fighter_1:"Miiファイター(格闘)",mii_fighter_2:"Miiファイター(剣術)",mii_fighter_3:"Miiファイター(射撃)"
};

const tbody = document.querySelector("#table tbody");

/* 描画 */
fighters.forEach((id, i) => {
  const tr = document.createElement("tr");

  const tdImg = document.createElement("td");
  const img = document.createElement("img");

  if (id === "mii_fighter_1") img.src = "./mii1.png";
  else if (id === "mii_fighter_2") img.src = "./mii2.png";
  else if (id === "mii_fighter_3") img.src = "./mii3.png";
  else img.src = `https://www.smashbros.com/assets_v2/img/fighter/${id}/main.png`;

  img.className = "icon";
  tdImg.appendChild(img);
  tr.appendChild(tdImg);

  const tdName = document.createElement("td");
  tdName.textContent = nameMap[id] || id;
  tdName.className = "char-cell char-name";
  tr.appendChild(tdName);

  for (let col = 1; col <= 4; col++) {
    const td = document.createElement("td");
    const btn = document.createElement("button");

    btn.textContent = "非VIP";
    btn.className = `nonvip col${col}`;
    btn.onclick = () => toggle(i, col, btn);

    td.appendChild(btn);
    tr.appendChild(td);
  }

  tbody.appendChild(tr);
});

/* 切替 */
function toggle(row, col, btn) {
  const isVIP = btn.textContent === "VIP";
  const newVal = isVIP ? "非VIP" : "VIP";

  btn.textContent = newVal;
  btn.className = (isVIP ? "nonvip" : "vip") + " col" + col;

  db.ref(`vip/${row}/${col}`).set(newVal);
}
</script>

</body>
</html>
